<!DOCTYPE html>
<html>
<head>
    <title>Odd or Even</title>
</head>
<body>
   
    <pre id="output"></pre>
    
    <script>

       
        function oddOrEven(num) {
         
            return num % 2 === 0 ? "even" : "odd";
        }

        let output = "";
        for (let i = 0; i <= 200; i++) {
            output += i + " is " + oddOrEven(i) + "\n";
        }
        document.getElementById("output").textContent = output;
       
    </script>
</body>
</html>
